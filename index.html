<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pulsar VPN</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #e0f2fe;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .container {
      max-width: 440px;
      margin: 0 auto;
      padding: 16px;
    }
    .header {
      text-align: center;
      margin: 20px 0 30px;
    }
    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 6px solid #67e8f9;
      background: url('https://i.imgur.com/f3aKI6f.jpg?updated=2026') center/cover;
      box-shadow: 0 0 40px rgba(103, 232, 249, 0.8);
      margin: 0 auto 15px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      color: #67e8f9;
      margin: 0;
      text-shadow: 0 0 25px rgba(103, 232, 249, 0.6);
    }
    .subtitle {
      font-size: 16px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .card {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #67e8f9;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      font-size: 15px;
    }
    .label { opacity: 0.8; }
    .value { font-weight: 600; color: #67e8f9; }

    .btn {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: #67e8f9;
      color: #0f172a;
    }
    .btn-secondary {
      background: #334155;
      color: #e0f2fe;
    }

    .instruction {
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo"></div>
      <div class="title">Pulsar VPN</div>
      <div class="subtitle">Быстрый и безопасный VPN</div>
    </div>

    <!-- Информация о подписке -->
    <div class="card">
      <div class="info-row">
        <span class="label">Статус:</span>
        <span class="value" id="status">Активна ✅</span>
      </div>
      <div class="info-row">
        <span class="label">Истекает:</span>
        <span class="value" id="expire">13 мая 2026</span>
      </div>
      <div class="info-row">
        <span class="label">Устройств:</span>
        <span class="value" id="devices">0 / 3</span>
      </div>
      <div class="info-row">
        <span class="label">Трафик:</span>
        <span class="value" id="traffic">∞ GB</span>
      </div>
    </div>

    <!-- Выбор платформы -->
    <div class="card">
      <select id="platform" onchange="changeInstruction()" style="width:100%; padding:14px; border-radius:12px; background:#1e2937; color:white; border:1px solid #67e8f9;">
        <option value="ios">iOS (iPhone / iPad)</option>
        <option value="android">Android</option>
      </select>
    </div>

    <!-- Инструкция -->
    <div class="card instruction" id="instruction-card">
      <h3>📱 Как подключить</h3>
      <p id="instruction-text">Выберите вашу платформу выше</p>
    </div>

    <!-- Кнопки действий -->
    <div class="card">
      <button class="btn btn-primary" onclick="addSubscription()">➕ Добавить подписку в Happ</button>
      <button class="btn btn-secondary" onclick="copyLink()">📋 Скопировать ссылку подписки</button>
    </div>

    <div class="card">
      <h3>✅ После подключения</h3>
      <p>Откройте Happ → нажмите большую кнопку включения → выберите сервер.</p>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#0f172a");
    tg.setBackgroundColor("#0f172a");

    // Данные подписки (пока тестовые)
    let subscriptionData = {
      status: "Активна ✅",
      expire: "13 мая 2026",
      devices: "2 / 3",
      traffic: "∞ GB",
      subscriptionUrl: "https://sub.24connect.ru/твоя_ссылка_здесь"
    };

    function updateSubscriptionInfo() {
      document.getElementById("status").textContent = subscriptionData.status;
      document.getElementById("expire").textContent = subscriptionData.expire;
      document.getElementById("devices").textContent = subscriptionData.devices;
      document.getElementById("traffic").textContent = subscriptionData.traffic;
    }

    function changeInstruction() {
      const platform = document.getElementById("platform").value;
      const textEl = document.getElementById("instruction-text");

      if (platform === "ios") {
        textEl.innerHTML = `
          1. Установите приложение <strong>Happ</strong> из App Store<br><br>
          2. Откройте Happ и разрешите VPN-конфигурацию<br><br>
          3. Нажмите кнопку «Добавить подписку» ниже
        `;
      } else {
        textEl.innerHTML = `
          1. Установите приложение <strong>Happ</strong> из Google Play<br><br>
          2. Откройте Happ и разрешите VPN<br><br>
          3. Нажмите кнопку «Добавить подписку» ниже
        `;
      }
    }

    function addSubscription() {
      if (!subscriptionData.subscriptionUrl || subscriptionData.subscriptionUrl.includes("твоя_ссылка")) {
        tg.showAlert("Подписка ещё не активна");
        return;
      }

      tg.showPopup({
        title: "Добавить подписку",
        message: "Ссылка будет скопирована.\nОткройте Happ → Добавьте подписку",
        buttons: [{id: "copy", type: "default", text: "Скопировать"}]
      }, function() {
        navigator.clipboard.writeText(subscriptionData.subscriptionUrl).then(() => {
          tg.showAlert("✅ Ссылка скопирована в буфер!");
        });
      });
    }

    function copyLink() {
      navigator.clipboard.writeText(subscriptionData.subscriptionUrl).then(() => {
        tg.showAlert("Ссылка скопирована");
      });
    }

    // Запуск
    window.onload = function() {
      updateSubscriptionInfo();
      changeInstruction();
    };
  </script>
</body>
</html>
